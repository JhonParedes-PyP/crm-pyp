{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso - P&P Soluciones Jurídicas Empresariales</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h2 {
            color: #003366;
            margin-bottom: 5px;
        }
        .login-box p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            color: #555;
            font-size: 13px;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .btn-login {
            background: #003366;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #002244;
        }
        .error-msg {
            color: #d9534f;
            font-size: 13px;
            margin-bottom: 15px;
            background: #fdf2f2;
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="{% static 'cobranza/logo_pyp.jpeg' %}" alt="P&P Soluciones" style="width:140px; height:auto; margin-bottom:12px; border-radius:8px;">
        <h2>P&P Soluciones Jurídicas Empresariales</h2>
        <p>Sistema Integrado de Cobranza</p>

        {% if form.errors %}
            <div class="error-msg">Usuario o contraseña incorrectos. Por favor, intente de nuevo.</div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">👤 Usuario:</label>
                <input type="text" name="username" id="id_username" required autofocus>
            </div>
            <div class="form-group">
                <label for="id_password">🔒 Contraseña:</label>
                <input type="password" name="password" id="id_password" required>
            </div>
            <button type="submit" class="btn-login">INGRESAR AL SISTEMA</button>
        </form>
    </div>

</body>
</html>
