<h2>Subir Cartera de Clientes - P&P Soluciones Jurídicas</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="file" name="archivo_excel" accept=".xlsx, .xls">
    <button type="submit">Cargar Clientes</button>
</form>

{% if mensajes %}
    <p style="padding:10px; border-radius:6px; background:{% if 'ADVERTENCIA' in mensajes %}#fff3cd; color:#856404;{% elif 'Error' in mensajes %}#f8d7da; color:#721c24;{% else %}#d4edda; color:#155724;{% endif %}">
        {{ mensajes }}
    </p>
{% endif %}
