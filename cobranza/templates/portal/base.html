<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portal de Autogestión - P&P{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            color: #333;
        }
        .portal-header {
            /* Degradado combinando Azul (P&P), Rojo (Caja Huancayo) y Verde (Proempresa) */
            background: linear-gradient(135deg, #003366 0%, #dc3545 50%, #28a745 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .portal-header img {
            max-height: 40px;
        }
        .portal-container {
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .btn-primary-custom {
            background: linear-gradient(to right, #003366, #0056b3);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
        }
        .btn-primary-custom:hover {
            background: linear-gradient(to right, #002244, #004494);
        }
    </style>
</head>
<body>

    <div class="portal-header d-flex justify-content-between align-items-center">
        <div>
            <strong style="letter-spacing: 1px;">P&P SOLUCIONES</strong>
        </div>
        {% if request.session.portal_deudor_id %}
        <div>
            <a href="{% url 'portal_logout' %}" class="text-white text-decoration-none">
                <i class="fa-solid fa-right-from-bracket"></i> Salir
            </a>
        </div>
        {% endif %}
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
