	<body class="lock-screen">
		<script type="text/javascript">
		var baseurl = '';
		</script>
		<style>
			#banner-navidad, #banner-anionuevo {
				display: none;
				text-align: center;
			}
			#banner-navidad a {
				left: 50px !important;
				height: 200px !important;
				width: 70px !important;
				position: fixed !important;
				top: 20px !important;
				z-index: 9999 !important;
			}
			
			#banner-anionuevo a {
				left: 50px !important;
				height: 120px !important;
				width: 250px !important;
				position: fixed !important;
				top: 20px !important;
				z-index: 9999 !important;
			}

			.txt-anio {
				position: absolute;
				bottom: -55px;
				left: 65%;
				transform: translateX(-50%);
				color: #FFFFFF;
				font-family: 'Times New Roman', serif;
				font-weight: bold;
				font-size: 60px;
				pointer-events: none;
			}
			
			#banner-navidad a img, #banner-anionuevo a img {
				width: 100% !important;
				height: 100% !important;
			}

			@media screen and (max-width: 980px) {
				#banner-navidad, #banner-anionuevo {
					display: none !important;
				}
			}
		</style>
		<div id="banner-navidad">
			<a href="#"><img src="../../../mis_servicios/natividad/feliz_navidad_ipbusiness.gif" alt="Feliz Navidad" title="Te deseo Feliz Navidad"/></a>
		</div>
		<div id="banner-anionuevo">
			<a href="#">
				<img src="../../../mis_servicios/natividad/anio_nuevo_ipbusiness.png" alt="Feliz Año Nuevo" title="Te deseo un Prospero Año Nuevo"/>
				<span id="anio-dinamico" class="txt-anio"></span>
			</a>
		</div>
		<script type="text/javascript">
			(function() {
				var fechaActual = new Date();
				var anioActual = fechaActual.getFullYear();
				var mes = fechaActual.getMonth() + 1; // Enero es 1
				var dia = fechaActual.getDate();
				
				var nav = document.getElementById('banner-navidad');
				var ano = document.getElementById('banner-anionuevo');
				var txtAnio = document.getElementById('anio-dinamico');

				// NAVIDAD
				if (mes === 12 && dia >= 18 && dia <= 25) {
					if(nav) nav.style.display = 'block';
				} 
				// AÑO NUEVO
				else if ((mes === 12 && dia >= 29) || (mes === 1 && dia <= 3)) {
					if(ano) {
						ano.style.display = 'block';
						if(txtAnio) {
							txtAnio.innerText = (mes === 12) ? anioActual + 1 : anioActual;
						}
					}
				}
			})();
		</script>
